<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jugador</title>
 <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">

<div class="card">
<input id="room" placeholder="Código sala">
<input id="name" placeholder="Nombre">
<button onclick="join()">Entrar</button>
</div>

<div class="card role-card" id="role"></div>
<div class="card vote-list" id="vote"></div>

</div>

<script>
const socket=io();
let room = localStorage.getItem("impostor_room") || "";
let playerId = localStorage.getItem("impostor_player_id") || "";
let playerName = localStorage.getItem("impostor_name") || "";
let currentPhase = "";

document.getElementById("room").value = room;
document.getElementById("name").value = playerName;

function join(){
 room=document.getElementById("room").value.toUpperCase().trim();
 playerName=document.getElementById("name").value.trim();
 socket.emit("join",{room,name:playerName,playerId});
}

socket.on("connect",()=>{
 if(room && playerName){
  socket.emit("join",{room,name:playerName,playerId});
 }
});

socket.on("joined",data=>{
 room = data.room;
 playerId = data.playerId;
 playerName = data.name;
 localStorage.setItem("impostor_room", room);
 localStorage.setItem("impostor_player_id", playerId);
 localStorage.setItem("impostor_name", playerName);
 document.getElementById("room").value = room;
 document.getElementById("name").value = playerName;
});

socket.on("role",d=>{
 document.getElementById("role").innerText =
 d.impostor ? "😈 Eres el impostor" : "📝 "+d.word;
});

socket.on("phase",p=>{
 currentPhase = p;
 if(p!=="voting"){
   document.getElementById("vote").innerHTML="";
 }
});

socket.on("players",list=>{
 if(currentPhase==="voting"){
  document.getElementById("vote").innerHTML =
  list.filter(p=>p.alive)
      .map(p=>`<button onclick="vote('${p.id}')">${p.name}</button>`)
      .join("");
 }
});

socket.on("errorMessage",msg=>{
 alert(msg);
});

function vote(target){
 socket.emit("vote",{room,target});
 document.getElementById("vote").innerHTML="✔️ Voto enviado";
}
</script>

</body>
</html>
